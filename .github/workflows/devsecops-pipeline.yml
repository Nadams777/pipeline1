name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build Docker image
        run: docker build -t pipeline1:${{ github.sha }} .
      - name: Create zip artifact
        run: |
          mkdir -p artifacts
          zip -r artifacts/pipeline1-${{ github.sha }}.zip . -x ".*" "node_modules/*" ".git/*" "venv/*" "__pycache__/*" "*.egg-info/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline1-build-${{ github.sha }}
          path: artifacts/
          retention-days: 30
  sast:
    name: SAST (Snyk)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=medium

      - name: Snyk Code (static analysis)
        uses: snyk/actions/python@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --severity-threshold=medium

  deploy:
    name: Deploy (push image to GHCR)
    runs-on: ubuntu-latest
    needs: sast
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }},${{ env.IMAGE_NAME }}:latest
  summary:
    name: Generate Pipeline Summary
    runs-on: ubuntu-latest
    needs: [build, sast, deploy]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate Summary Report
        run: python .github/scripts/generate-summary.py

      - name: Upload Summary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-summary
          path: artifacts/
          retention-days: 30
